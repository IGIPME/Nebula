# ── Nebula Frontend Nginx Config ─────────────────────────────────────
# Serves the React SPA static bundle. API routing is handled by the
# APISIX gateway, which sits in front of all services.
#
# 上下文：Dockerfile.frontend 将此文件 COPY 到 /etc/nginx/conf.d/default.conf

server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback — 所有非文件路径返回 index.html 用于客户端路由
    location / {
        try_files $uri $uri/ /index.html;
    }
}
