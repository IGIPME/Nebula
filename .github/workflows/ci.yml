# ── Nebula CI Pipeline ────────────────────────────────────────────
#
# 触发条件：push / PR 到 master 分支，或手动触发
#
# 包含：
#   1. Rust workspace: 格式化检查 → clippy → 测试
#   2. 前端: lint → 类型检查 → 构建

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # Rust 后端
  # ═══════════════════════════════════════════════════════════════════
  rust:
    name: Rust (${{ matrix.crate }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [nebula-core, nebula-cli, nebula-ffi]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ matrix.crate }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.crate }}-
            ${{ runner.os }}-cargo-

      # 仅在一个 crate 上运行 fmt（共享同一代码风格）
      - name: Check formatting (fmt)
        if: matrix.crate == 'nebula-core'
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy -p ${{ matrix.crate }} -- -D warnings

      - name: Run tests
        run: cargo test -p ${{ matrix.crate }}

  # ═══════════════════════════════════════════════════════════════════
  # 前端
  # ═══════════════════════════════════════════════════════════════════
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/nebula

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: |
            ~/.pnpm-store
            src/nebula/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('src/nebula/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm exec tsc -b

      - name: Build
        run: pnpm build
