# ── Nebula Docker Compose ────────────────────────────────────────
#
# 单机开发部署：APISIX Gateway + nebula-server (Rust Axum) + nebula-frontend (React Nginx)
#
# 使用方式：
#   docker compose build
#   docker compose up -d
#   docker compose logs -f
#   docker compose down
#

services:
  # ── API 网关 (Apache APISIX) ────────────────────────────────────
  nebula-gateway:
    image: apache/apisix:3.14.0-debian
    container_name: nebula-gateway
    ports:
      - "${APISIX_HTTP_PORT:-80}:9080"
      # 未来启用 HTTPS 或 Prometheus 时取消注释：
      # - "${APISIX_HTTPS_PORT:-9443}:9443"
      # - "${APISIX_PROMETHEUS_PORT:-9180}:9180"
    volumes:
      - ./apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    restart: unless-stopped
    depends_on:
      nebula-server:
        condition: service_healthy
      nebula-frontend:
        condition: service_started
    networks:
      - nebula-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSo /dev/null http://127.0.0.1:9080/ || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 20s

  # ── Rust 后端 ──────────────────────────────────────────────────
  nebula-server:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: nebula-server:latest
    container_name: nebula-server
    ports:
      - "3030:3030"
    environment:
      - NEBULA_SERVER_ADDR=0.0.0.0:3030
      - RUST_LOG=nebula_ffi=info,tower_http=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3030/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - nebula-net

  # ── React 前端 (nginx, 仅静态文件) ─────────────────────────────
  nebula-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: nebula-frontend:latest
    container_name: nebula-frontend
    # 不对外暴露端口 — APISIX 作为唯一入口代理所有流量
    restart: unless-stopped
    networks:
      - nebula-net

  # ── pymeep 仿真环境 (Ubuntu 22.04 + Miniconda + pymeep) ──────────
  nebula-mpmcp:
    build:
      context: .
      dockerfile: src/python/mpmcp/Dockerfile
    image: nebula-mpmcp:latest
    container_name: nebula-mpmcp
    command: ["sleep", "infinity"]
    ports:
      - "${MPMCP_SSH_PORT:-2222}:22"
    volumes:
      - ./data/Workspace:/home/nebula/Workspace
      - ./data/PDK:/home/nebula/PDK
      - ./data/Examples:/home/nebula/Examples
    restart: unless-stopped
    networks:
      - nebula-net

networks:
  nebula-net:
    driver: bridge
    name: nebula-net
