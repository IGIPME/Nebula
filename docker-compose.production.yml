# ── Nebula 生产环境 Docker Compose ────────────────────────────────
#
# 从腾讯云 TCR 镜像仓库拉取预构建镜像进行部署。
#
# 使用方式：
#   docker compose -f docker-compose.production.yml --env-file .env pull    # 拉取最新镜像
#   docker compose -f docker-compose.production.yml --env-file .env up -d   # 启动容器
#   docker compose -f docker-compose.production.yml --env-file .env down    # 关闭容器
#
# 前置条件：
#   已登录腾讯云 TCR：docker login ccr.ccs.tencentyun.com

services:
  # ── API 网关 (Apache APISIX) ────────────────────────────────────
  nebula-gateway:
    image: apache/apisix:${APISIX_IMAGE_TAG:-3.14.0-debian}
    container_name: nebula-gateway
    ports:
      - "${APISIX_HTTP_PORT:-80}:9080"
      # 未来启用 HTTPS 或 Prometheus 时取消注释：
      # - "${APISIX_HTTPS_PORT:-9443}:9443"
      # - "${APISIX_PROMETHEUS_PORT:-9180}:9180"
    volumes:
      - ./apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      nebula-server:
        condition: service_healthy
      nebula-frontend:
        condition: service_started
    networks:
      - nebula-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSo /dev/null http://127.0.0.1:9080/ || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 20s

  # ── Rust 后端 ──────────────────────────────────────────────────
  nebula-server:
    image: ${BACKEND_IMAGE:-ccr.ccs.tencentyun.com/igipme.nebula/nebula.backend}:${BACKEND_IMAGE_TAG:-latest}
    container_name: nebula-server
    ports:
      - "${BACKEND_PORT:-3030}:3030"
    environment:
      - NEBULA_SERVER_ADDR=${NEBULA_SERVER_ADDR:-0.0.0.0:3030}
      - RUST_LOG=${RUST_LOG:-nebula_ffi=info,tower_http=info}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3030/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - nebula-net

  # ── React 前端 (nginx, 仅静态文件) ─────────────────────────────
  nebula-frontend:
    image: ${FRONTEND_IMAGE:-ccr.ccs.tencentyun.com/igipme.nebula/nebula.frontend}:${FRONTEND_IMAGE_TAG:-latest}
    container_name: nebula-frontend
    # 不对外暴露端口 — APISIX 作为唯一入口代理所有流量
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - nebula-net

  # ── pymeep 仿真环境 (Ubuntu 22.04 + Miniconda + pymeep) ──────────
  nebula-mpmcp:
    image: ${MPMCP_IMAGE:-ccr.ccs.tencentyun.com/igipme.nebula/nebula.mpmcp}:${MPMCP_IMAGE_TAG:-latest}
    container_name: nebula-mpmcp
    command: ["sleep", "infinity"]
    ports:
      - "${MPMCP_SSH_PORT:-2222}:22"
    volumes:
      - ./data/Workspace:/home/nebula/Workspace
      - ./data/PDK:/home/nebula/PDK
      - ./data/Examples:/home/nebula/Examples
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - nebula-net

networks:
  nebula-net:
    driver: bridge
    name: nebula-net
